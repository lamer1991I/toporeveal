<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="body" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#58d6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </radialGradient>
    <radialGradient id="top" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#79e3ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cuerpo del router — forma cilíndrica 3D -->
  <!-- Cara inferior (elipse sombra) -->
  <ellipse cx="32" cy="46" rx="22" ry="8" fill="#0d1f3a" opacity="0.5"/>

  <!-- Cara lateral -->
  <path d="M10 36 Q10 46 32 46 Q54 46 54 36 L54 28 Q54 28 32 28 Q10 28 10 28 Z"
        fill="url(#body)" stroke="#388bfd" stroke-width="0.5"/>

  <!-- Cara superior (elipse) -->
  <ellipse cx="32" cy="28" rx="22" ry="8" fill="url(#top)" stroke="#79e3ff" stroke-width="0.8"/>

  <!-- Flechas en la cara superior — estilo Cisco Packet Tracer -->
  <!-- Flecha izquierda -->
  <polygon points="20,28 15,25 15,27 10,27 10,29 15,29 15,31"
           fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
  <!-- Flecha derecha -->
  <polygon points="44,28 49,25 49,27 54,27 54,29 49,29 49,31"
           fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
  <!-- Flecha arriba -->
  <polygon points="32,21 29,26 31,26 31,31 33,31 33,26 35,26"
           fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
  <!-- Flecha abajo -->
  <polygon points="32,35 29,30 31,30 31,25 33,25 33,30 35,30"
           fill="#ffffff" opacity="0.9" filter="url(#glow)"/>

  <!-- LED indicador -->
  <circle cx="32" cy="22" r="2" fill="#3fb950" opacity="0.9" filter="url(#glow)"/>

  <!-- Ondas WiFi encima del router -->
  <path d="M24 17 Q32 12 40 17" fill="none" stroke="#58d6ff" stroke-width="1.5"
        stroke-linecap="round" opacity="0.8"/>
  <path d="M20 13 Q32 6 44 13" fill="none" stroke="#58d6ff" stroke-width="1.2"
        stroke-linecap="round" opacity="0.5"/>
  <path d="M28 20 Q32 17 36 20" fill="none" stroke="#58d6ff" stroke-width="1.8"
        stroke-linecap="round" opacity="0.9"/>
</svg>
