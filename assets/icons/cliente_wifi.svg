<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="screen" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#1a7a30"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cuerpo del dispositivo -->
  <rect x="16" y="14" width="32" height="26" rx="3" ry="3"
        fill="#161b22" stroke="#3fb950" stroke-width="1.2"/>

  <!-- Pantalla -->
  <rect x="19" y="17" width="26" height="20" rx="2" ry="2"
        fill="url(#screen)" opacity="0.3"/>

  <!-- Líneas de pantalla (actividad) -->
  <line x1="22" y1="22" x2="42" y2="22" stroke="#3fb950" stroke-width="1" opacity="0.7"/>
  <line x1="22" y1="26" x2="38" y2="26" stroke="#3fb950" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="30" x2="40" y2="30" stroke="#3fb950" stroke-width="1" opacity="0.6"/>

  <!-- Base/soporte -->
  <rect x="26" y="40" width="12" height="4" rx="1"
        fill="#30363d" stroke="#3fb950" stroke-width="0.8"/>
  <rect x="20" y="44" width="24" height="3" rx="2"
        fill="#30363d" stroke="#3fb950" stroke-width="0.8"/>

  <!-- Ondas WiFi pequeñas arriba a la derecha -->
  <path d="M40 16 Q43 13 46 16" fill="none" stroke="#58d6ff"
        stroke-width="1.4" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <path d="M41 13 Q43 10 45 13" fill="none" stroke="#58d6ff"
        stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
</svg>
